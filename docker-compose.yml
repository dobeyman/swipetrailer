services:
  trailerswipe:
    build: .
    image: trailerswipe:latest
    container_name: trailerswipe
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - traefik_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.trailerswipe.entrypoints=web,websecure"
      - "traefik.http.routers.trailerswipe.rule=Host(`swipe.az.jen.re`)"
      - "traefik.http.routers.trailerswipe.tls=true"
      - "traefik.http.routers.trailerswipe.tls.certresolver=leresolver"
      - "traefik.http.services.trailerswipe.loadbalancer.server.port=3000"

networks:
  traefik_network:
    external: true
